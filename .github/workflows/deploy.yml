name: Classic Deploy (FTP) to o2switch

on:
  push:
    branches: [ main, feature/deploy-monitoring ]

jobs:
  deploy-frontend:
    name: "🚀 Déploiement Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies & Build
        working-directory: ./formatrack_frontend
        run: |
          pnpm install
          pnpm run build

      - name: "📤 Déploiement Frontend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_frontend/dist/
          server-dir: frontend/

  deploy-backend:
    name: "🚀 Déploiement Backend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "📤 Déploiement Backend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_api/
          server-dir: api/
          exclude: |
            **/vendor/**
            **/.env
            **/.git*
            **/node_modules/**
