name: Deploy to o2switch via SSH

on:
  push:
    branches: [ main, feature/deploy-monitoring ]

jobs:
  # ─────────────────────────────────────────────────
  #  FRONTEND
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Build & Deploy Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies & Build
        working-directory: ./formatrack_frontend
        run: |
          pnpm install
          pnpm run build

      # Step 1: Get GitHub runner's public IP
      - name: Get Runner IP
        id: ip
        run: echo "runner_ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # Step 2: Whitelist IP via cPanel API
      - name: Authorize SSH IP on o2switch
        run: |
          curl -s "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SSH/create_key_authorization" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data-urlencode "comment=github-actions-runner" \
            --data-urlencode "allowed_from=${{ steps.ip.outputs.runner_ip }}"
          # Give the firewall time to apply
          sleep 5

      # Step 3: Deploy via SCP
      - name: "📤 Déploiement Frontend via SCP"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "formatrack_frontend/dist/*"
          target: "/home/${{ secrets.FTP_USER }}/formatrack/frontend"
          strip_components: 2

      # Step 4: Remove IP from whitelist (cleanup)
      - name: Remove Runner IP from whitelist
        if: always()
        run: |
          curl -s "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SSH/delete_key_authorization" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data-urlencode "comment=github-actions-runner"

  # ─────────────────────────────────────────────────
  #  BACKEND
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Build & Deploy Backend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create .env from GitHub Secret (no manual file needed!)
      - name: "📝 Créer le fichier .env de production"
        run: |
          cat > ./formatrack_api/.env << 'ENVEOF'
          ${{ secrets.PROD_ENV_FILE }}
          ENVEOF

      # Step 1: Get GitHub runner's public IP
      - name: Get Runner IP
        id: ip
        run: echo "runner_ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # Step 2: Whitelist IP via cPanel API
      - name: Authorize SSH IP on o2switch
        run: |
          curl -s "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SSH/create_key_authorization" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data-urlencode "comment=github-actions-runner" \
            --data-urlencode "allowed_from=${{ steps.ip.outputs.runner_ip }}"
          sleep 5

      # Step 3: Deploy code via SCP (no vendor, no node_modules)
      - name: "📤 Déploiement Backend via SCP"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "formatrack_api/*,!formatrack_api/vendor,!formatrack_api/node_modules"
          target: "/home/${{ secrets.FTP_USER }}/formatrack/api"
          strip_components: 1

      # Step 4: Run artisan commands via SSH
      - name: "⚙️ Commandes post-déploiement via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.FTP_USER }}/formatrack/api
            /usr/local/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader
            /usr/local/bin/php artisan migrate --force
            /usr/local/bin/php artisan storage:link
            /usr/local/bin/php artisan config:cache
            /usr/local/bin/php artisan route:cache
            echo "✅ Déploiement terminé avec succès."

      # Step 5: Remove IP from whitelist (cleanup, always runs)
      - name: Remove Runner IP from whitelist
        if: always()
        run: |
          curl -s "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SSH/delete_key_authorization" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            --data-urlencode "comment=github-actions-runner"
