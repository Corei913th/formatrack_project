name: Deploy to o2switch (FTP + Cron Automation)

on:
  push:
    branches: [ main, feature/deploy-monitoring, feature/initialize-frontend ]

jobs:
  # ─────────────────────────────────────────────────
  #  FRONTEND
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Build & Deploy Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: "📝 Préparation du .env Frontend"
        run: |
          printf '%s' "${{ secrets.FRONTEND_ENV_FILE }}" > ./formatrack_frontend/.env
          echo "VITE_API_BASE_URL est présent dans le .env"

      - name: "📦 Build Frontend"
        working-directory: ./formatrack_frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          pnpm install
          pnpm run build
        continue-on-error: true

      - name: "📤 Déploiement Frontend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_frontend/dist/
          server-dir: frontend/

  # ─────────────────────────────────────────────────
  #  BACKEND
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend"
    needs: deploy-frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "📝 Préparation du .env et du Flag"
        run: |
          printf '%s' "${{ secrets.PROD_ENV_FILE }}" > ./formatrack_api/.env
          echo "Remplacement APP_KEY..."
          NEW_KEY=$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")
          sed -i '/^APP_KEY=/d' ./formatrack_api/.env
          echo "APP_KEY=$NEW_KEY" >> ./formatrack_api/.env
          echo "deploy" > ./formatrack_api/deploy.flag

      - name: "📤 Déploiement Backend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_api/
          server-dir: api/
          exclude: |
            **/vendor/**
            **/.git*
            **/node_modules/**

      - name: "✅ Terminé"
        run: echo "Déploiement terminé dans api/ et frontend/"
