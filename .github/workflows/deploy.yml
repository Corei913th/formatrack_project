name: Deploy to o2switch (FTP + Cron Automation)

on:
  push:
    branches: [ main, feature/deploy-monitoring ]

jobs:
  # ─────────────────────────────────────────────────
  #  FRONTEND
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Build & Deploy Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: "📦 Build Frontend"
        working-directory: ./formatrack_frontend
        run: |
          pnpm install
          pnpm run build
        continue-on-error: true

      - name: "📤 Déploiement Frontend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_frontend/dist/
          server-dir: public_html/formatrack/frontend/

  # ─────────────────────────────────────────────────
  #  BACKEND
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend"
    needs: deploy-frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "📝 Créer le fichier .env de production"
        run: printf '%s' "${{ secrets.PROD_ENV_FILE }}" > ./formatrack_api/.env

      - name: "📤 Déploiement Backend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_api/
          server-dir: public_html/formatrack/api/
          exclude: |
            **/vendor/**
            **/.git*
            **/node_modules/**

      # On crée le fichier "flag" qui déclenchera la tâche Cron
      - name: "🚩 Déclenchement du Cron (Créer deploy.flag)"
        run: |
          echo "deploy" > deploy.flag
          curl -T deploy.flag --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}/public_html/formatrack/api/deploy.flag"
          echo "✅ Signal de déploiement envoyé au serveur."
