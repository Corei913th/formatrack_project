name: Deploy

on:
  workflow_run:
    workflows: [ "Backend CI", "Frontend CI" ]
    types:
      - completed
    branches:
      - main
      - feature/deploy-monitoring
  push:
    branches: [ feature/deploy-monitoring ]

jobs:
  # On vérifie si les workflows de CI ont réussi avant de déployer
  check-ci:
    runs-on: ubuntu-latest
    if: |
      (github.event.workflow_run.conclusion == 'success' && 
       (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'feature/deploy-monitoring')) || 
      github.event_name == 'push'
    steps:
      - run: echo "CI validated or manual push. Proceeding to deploy..."

  # ─────────────────────────────────────────────────
  #  FRONTEND
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Build & Deploy Frontend"
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: "📝 Préparation & Build"
        working-directory: ./formatrack_frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          printf '%s' "${{ secrets.FRONTEND_ENV_FILE }}" > .env
          pnpm install
          pnpm run build

      - name: "📤 Déploiement Frontend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_frontend/dist/
          server-dir: frontend/

  # ─────────────────────────────────────────────────
  #  BACKEND
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend"
    needs: [ check-ci, deploy-frontend ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "📝 Préparation du .env et du Flag"
        run: |
          printf '%s' "${{ secrets.PROD_ENV_FILE }}" > ./formatrack_api/.env
          grep -q "^APP_KEY=" ./formatrack_api/.env || echo "APP_KEY=" >> ./formatrack_api/.env
          NEW_KEY=$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")
          sed -i 's|^APP_KEY=.*|APP_KEY='${NEW_KEY}'|' ./formatrack_api/.env
          echo "deploy" > ./formatrack_api/deploy.flag

      - name: "📤 Déploiement Backend via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./formatrack_api/
          server-dir: api/
          exclude: |
            **/vendor/**
            **/.git*
            **/node_modules/**

      - name: "✅ Terminé"
        run: echo "Déploiement terminé dans api/ et frontend/"
