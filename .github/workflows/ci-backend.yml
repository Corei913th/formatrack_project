name: 🏗️ Backend CI - Validation & Security

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  security:
    name: 🛡️ Security Audit & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - name: Install Dependencies
        working-directory: ./formatrack_api
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress
          --prefer-dist
      - name: Composer Audit
        working-directory: ./formatrack_api
        run: composer audit --abandoned=ignore
      - name: Larastan SAST
        working-directory: ./formatrack_api
        run: ./vendor/bin/phpstan analyse --error-format=github --memory-limit=1G

  secret-scan:
    name: 🛡️ Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Fetch PR base branch and merge ref
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune origin +refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}
          git fetch --no-tags --prune origin +refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/origin/pr/${{ github.event.pull_request.number }}
          git fetch origin ${{ github.event.pull_request.head.ref }}
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac:
    name: 🛡️ IaC & Docker Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  lint:
    name: 🧹 Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - name: Install Dependencies
        working-directory: ./formatrack_api
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress
          --prefer-dist
      - name: PHP Pint
        working-directory: ./formatrack_api
        run: ./vendor/bin/pint --test

  tests:
    name: 🧪 Feature & Unit Tests
    needs: [ security, lint, iac ]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: formatrack_db_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, bcmath
          coverage: none
      - name: Install Dependencies
        working-directory: ./formatrack_api
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress
          --prefer-dist
      - name: Copy .env
        working-directory: ./formatrack_api
        run: php -r "file_exists('.env') || copy('.env.testing', '.env');"
      - name: Generate Key
        working-directory: ./formatrack_api
        run: php artisan key:generate
      - name: Directory Permissions
        working-directory: ./formatrack_api
        run: chmod -R 777 storage bootstrap/cache
      - name: Run Migrations
        working-directory: ./formatrack_api
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: formatrack_db_test
          DB_USERNAME: user
          DB_PASSWORD: password
        run: php artisan migrate --force
      - name: Run Tests
        working-directory: ./formatrack_api
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: formatrack_db_test
          DB_USERNAME: user
          DB_PASSWORD: password
        run: php artisan test
